name: Socket Security

# SETUP REQUIRED: This workflow requires a Socket.dev account (free for open source).
# 1. Sign up at https://socket.dev
# 2. No API key secret is needed — the action uses GITHUB_TOKEN.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  socket-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Run Socket Security
        uses: SocketDev/action@937f824ec476dfd164d4a4d9995751427b0be143 # v1
        with:
          issue-severity: high
        continue-on-error: true
